version: '3.8'

services:
  backend:
    image: tylercorellium/ipatool-backend:latest
    container_name: ipatool-backend
    restart: unless-stopped
    ports:
      # Only expose to localhost for nginx reverse proxy
      - "127.0.0.1:3001:3001"
    environment:
      - BACKEND_PORT=3001
      - PUBLIC_HOSTNAME=${PUBLIC_HOSTNAME:-apps.pwndarw.in}
      - NODE_ENV=production
    volumes:
      # Mount /tmp for IPA file storage (ephemeral)
      - ipatool-tmp:/tmp
    networks:
      - ipatool-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: tylercorellium/ipatool-web:latest
    container_name: ipatool-frontend
    restart: unless-stopped
    ports:
      # Only expose to localhost for nginx reverse proxy
      - "127.0.0.1:3002:80"
    networks:
      - ipatool-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  ipatool-network:
    driver: bridge

volumes:
  ipatool-tmp:
    driver: local
